seo:
  title: About November Preston, LMFT | Queer Somatic Therapist
  description: "Learn about November Preston, LMFT: queer-affirming, trauma-informed somatic therapist offering California telehealth and East Bay ecotherapy options."
  og_description: "Background, clinical approach, and trainings for November Preston's queer and trans affirming somatic psychotherapy practice."
  twitter_description: "Read about November Preston's approach, values, and training in trauma-informed somatic therapy and ecotherapy."
  social_image_alt: Portrait of therapist November Preston outdoors
hero:
  title_id: about-title
  eyebrow: About the practice
  title: About November Preston
  paragraphs:
    - I am a Licensed Marriage and Family Therapist (#119501) supporting queer and trans youth and adults in California. My practice is trauma-informed, relational, and somatic, with care paced to your capacity and goals.
    - Therapy with me is collaborative and consent-based. We track patterns in mind, body, and relationship, then build practical tools for regulation while making space for deeper healing.
    - "While I work one-on-one with individuals, I also hold the wider systems shaping each person's life: oppression, exclusion, and support all affect how pain is carried and how healing becomes possible."
    - My approach is queer-affirming, relational, and anti-oppressive. I do not treat you as broken; we work together to understand adaptive patterns, reduce suffering, and build capacity for choice, connection, and self-trust.
  buttons:
    - class: btn btn-primary
      label: Schedule a consult
      spwidget: true
    - class: btn btn-secondary
      label: Explore ecotherapy
      href: ../ecotherapy/
      spwidget: false
  image:
    key: about_hero_portrait_vertical
    alt: Therapist November Preston outdoors
    caption: Queer-affirming care rooted in curiosity, collaboration, and nervous-system awareness.
approach:
  title_id: approach-title
  title: Approach at a glance
  items:
    - Queer and trans centered psychotherapy
    - Somatic and trauma-informed methods
    - Relational, anti-oppressive, and strengths-based lens
    - Telehealth statewide in California with optional East Bay ecotherapy
values:
  title_id: fit-values-title
  title: Values in session
  paragraphs:
    - You can expect explicit consent practices, transparent communication, and room for complexity. We move at a pace that supports safety without losing momentum.
    - "**Systemic context:** Your distress is not only personal; it is also shaped by social conditions, identity-based stress, and relational environments."

seo:
  title: Queer Somatic Therapy in California | November Preston, LMFT
  description: Queer-affirming, trauma-informed somatic therapy for California adults. Telehealth statewide, with East Bay ecotherapy options and free 20-minute consultations.
  og_description: Queer and trans affirming somatic psychotherapy with telehealth statewide in California and optional East Bay ecotherapy sessions.
  twitter_description: Somatic psychotherapy for queer and trans youth and adults across California, with East Bay nature-based session options.
  social_image_alt: Portrait of therapist November Preston smiling
hero:
  title_id: home-title
  eyebrow: Telehealth statewide California • East Bay ecotherapy option
  title: Queer Somatic Therapy in California
  subhead: Collaborative psychotherapy for queer and trans adults healing trauma, anxiety, grief, and attachment wounds. Sessions are grounded in consent, body awareness, and practical nervous-system support.
  buttons:
    - class: btn btn-primary
      label: Schedule a free 20-minute consult
      spwidget: true
  image:
    key: home_hero_portrait
    alt: Portrait of therapist November Preston smiling
    caption: 'November Preston, LMFT #119501'
services:
  title_id: services-title
  title: Who this care is for
  pills_label: Client focus areas
  pills:
    - Queer and trans youth and adults
    - Autists, ADHDers, Neuroqueers
    - Anxiety, depression, and grief
    - Attachment and relational healing
  cards:
    - title: Somatic psychotherapy
      body: Body-based therapy for regulation, resilience, and deeper self-trust.
    - title: Trauma-informed pacing
      body: Work that respects your window of tolerance and centers consent every step of the way.
    - title: Telehealth and ecotherapy
      body: Meet online statewide in California, with optional East Bay outdoor sessions as a fit.
nature_band:
  title_id: nature-title
  title: Nature as regulation, reflection, and perspective
  body: Ecotherapy can be integrated into ongoing psychotherapy when it supports your goals. Learn how [nature-based sessions work](./ecotherapy/) and what to expect.
  image:
    key: home_nature_band
    alt: Open East Bay trail at sunrise
fit:
  title_id: fit-title
  good:
    title: Good fit
    items:
      - Adults in California seeking queer-affirming trauma therapy
      - Interest in body-based, relational, or nature-based work
      - Looking for weekly ongoing care
  maybe_not:
    title: May not be the best fit
    items:
      - Need immediate crisis stabilization
      - Need insurance-only billing
      - Looking for in-person, in-office sessions
faq_preview:
  title_id: faq-preview-title
  title: Common questions
  cards:
    - title: Do you take insurance?
      body: Out-of-network superbills are available. Full details are on the [therapy rates and insurance FAQ](./faq/).
    - title: Do you offer sliding scale?
      body: Yes, a limited number of reduced-fee spots are reserved based on need and availability.
    - title: Where are sessions held?
      body: Telehealth is statewide in California, with ecotherapy options in East Bay settings.
cta:
  title_id: home-contact-title
  title: Ready to talk?
  body: Start with a free consult to ask questions and decide whether working together feels aligned. You can review logistics on the [Contact page](./contact/) or schedule now.
  buttons:
    - class: btn btn-primary
      label: Request Appointment
      spwidget: true
    - class: btn btn-secondary
      label: Contact details
      href: ./contact/
      spwidget: false

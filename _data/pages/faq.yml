hero:
  title_id: faq-title
  eyebrow: Frequently asked questions
  title: Therapy FAQ for California Clients
  body: Questions below cover logistics, fees, and session format. If you need anything else, you can [reach out directly](../contact/) before scheduling.
faq:
  title_id: faq-list-title
  title: Common questions and answers
  items:
    - question: How can we meet for sessions?
      answer: Telehealth is available statewide in California by secure video. Ecotherapy sessions in East Bay settings are available after initial sessions, and can be integrated regularly or as needed. Review [East Bay ecotherapy session details](../ecotherapy/) for what to expect.
    - question: What are your rates?
      answer:  My payment system is based on Bayo Akomolafe’s three tiered system of Solidarity, True Value, and Community Care. The system is designed to reflect the realities of disparity in access to wealth and resources, and it enables me to work with clients who otherwise could not afford the true value of my services. It asks you to consider your current financial circumstances, as well as the historical discrimination faced by your peoples, and any inheritance or investments expected to impact future wealth. The True Value fee is $220, the Solidarity fee is $330, and the Community Care fee is $110. We can discuss this system during our consultation if you need support in contemplating your experiences in this framework. 
    - question: Do you offer a sliding scale?
      answer: Yes. A limited number of sliding-scale openings are reserved based on need and availability, with priority for BIPOC, queer, trans, and low-income clients.
    - question: Do you take insurance?
      answer: Insurance is not billed directly. A superbill can be provided for out-of-network reimbursement. Please check your specific mental health benefits with your plan.
    - question: Where are you located?
      answer: The practice is based in the East Bay of the San Francisco Bay Area. Telehealth is available statewide in California, and ecotherapy sessions are offered in East Bay locations.

<footer class="site-footer">
  <div class="container">
    <p>{{ site.data.site.footer_text }}</p>
    <div class="footer-links" aria-label="Footer navigation">
      {% for item in site.data.site.navigation %}
      <a href="{{ include.root_prefix }}{{ item.path }}">{{ item.label }}</a>
      {% endfor %}
    </div>
  </div>
</footer>
